sentence=Arduino library for the goBILDA Pinpoint Odometry Computer with IMU sensor fusion.
paragraph=This library provides an easy-to-use interface for communicating with the goBILDA Pinpoint Odometry Computer. It allows you to read encoder and IMU-based position data, retrieve device information, and configure parameters through I2C. Designed for robotics applications, it fuses odometry and inertial data to deliver accurate X/Y position and heading estimates in real time.
